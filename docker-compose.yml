services:
  # Frontend (Streamlit UI)
  frontend:
    build: .
    ports:
      - "8501:8501" # Access UI at http://localhost:8501
    depends_on:
      - orion
      - quantumleap
    environment:
      # Pass these env vars if your python functions support them
      - ORION_HOST=orion
      - QL_HOST=quantumleap
      - TIMESCALE_HOST=timescale
  # 1. Orion-LD Context Broker
  orion:
    image: fiware/orion-ld
    ports:
      - "1026:1026"
    command: -dbhost mongo -logLevel DEBUG
    depends_on:
      - mongo

  # 2. MongoDB (For Orion's current state)
  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    command: --nojournal
    volumes:
      - mongo-db:/data/db

  # 3. QuantumLeap (The Connector for History)
  quantumleap:
    image: orchestracities/quantumleap
    ports:
      - "8668:8668"
    environment:
      - POSTGRES_HOST=timescale
      - POSTGRES_PORT=5432
      - POSTGRES_DB_NAME=postgres
      - POSTGRES_DB_USER=postgres
      - POSTGRES_DB_PASS=password
      - QL_DEFAULT_DB=timescale 
    depends_on:
      - timescale

  # 4. TimescaleDB (This IS PostgreSQL + TimeSeries plugin)
  timescale:
    image: timescale/timescaledb-ha:pg14-latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-db:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d 
      
# 5. Keycloak (Identity & Access Management)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    command: start-dev
    ports:
      - "8080:8080" # Access Keycloak admin console at http://localhost:8080
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    depends_on:
      - timescale # Optional: just to ensure backend data layer is up first

# 6. Grafana (Time-Series Dashboards)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000" # Access UI at http://localhost:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - timescale
    volumes:
      - grafana-storage:/var/lib/grafana
# 7. Custom Real-Time Receiver
  receiver:
    build: ./receiver
    ports:
      - "5000:5000"
    depends_on:
      - orion
    environment:
      - PYTHONUNBUFFERED=1
volumes:
  mongo-db:
  postgres-db:
  grafana-storage: