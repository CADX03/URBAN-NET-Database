services:
# Frontend (Streamlit UI)
  frontend:
    build: .
    ports:
      - "8501:8501" # Access UI at http://localhost:8501
    depends_on:
      - orion
      - quantumleap
    environment:
      - ORION_HOST=orion
      - QL_HOST=quantumleap
      - TIMESCALE_HOST=timescale
      - IOTA_HOST=iot-agent
      - MQTT_HOST=mosquitto
      - KEYCLOAK_AUTHORIZE_URL=${KEYCLOAK_AUTHORIZE_URL}
      - KEYCLOAK_TOKEN_URL=${KEYCLOAK_TOKEN_URL}
      - KEYCLOAK_REVOKE_URL=${KEYCLOAK_REVOKE_URL}
      - KEYCLOAK_BROWSER_LOGOUT_URL=${KEYCLOAK_BROWSER_LOGOUT_URL}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}

# 1. Orion-LD Context Broker (Ports removed - Internal Only)
  orion:
    image: fiware/orion-ld
    command: -dbhost mongo -logLevel DEBUG
    depends_on:
      - mongo

# 2. MongoDB (Ports removed - Internal Only)
  mongo:
    image: mongo:4.4
    command: --nojournal
    volumes:
      - mongo-db:/data/db

# 3. QuantumLeap (Ports removed - Internal Only)
  quantumleap:
    image: orchestracities/quantumleap
    environment:
      - POSTGRES_HOST=timescale
      - POSTGRES_PORT=5432
      - POSTGRES_DB_NAME=postgres
      - POSTGRES_DB_USER=postgres
      - POSTGRES_DB_PASS=${POSTGRES_PASSWORD} 
      - QL_DEFAULT_DB=timescale 
    depends_on:
      - timescale

# 4. TimescaleDB (Ports removed - Internal Only)
  timescale:
    image: timescale/timescaledb-ha:pg14-latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD} 
    volumes:
      - postgres-db:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d 
      
# 5. Keycloak (Identity & Access Management - External)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    command: start-dev
    ports:
      - "8080:8080" # Access Keycloak admin console at http://localhost:8080
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      - timescale

# 6. Grafana (Time-Series Dashboards - External)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000" # Access UI at http://localhost:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    depends_on:
      - timescale
    volumes:
      - grafana-storage:/var/lib/grafana

# 7. Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    hostname: mosquitto
    # NOTE: Uncomment the ports below ONLY IF your IoT devices are external to the host server.
    # If your devices simulate data from within the same docker network, keep these closed.
    # ports:
    #   - "1883:1883" # Standard MQTT port
    #   - "9001:9001" # WebSockets port (optional, good for web dashboards)
    volumes:
      # Mounts a local config file to allow anonymous local connections 
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

# 8. FIWARE IoT Agent (Ports removed - Internal Only)
  iot-agent:
    image: fiware/iotagent-json:latest
    hostname: iot-agent
    depends_on:
      - mongo
      - mosquitto
      - orion
    environment:
      - IOTA_CB_HOST=orion # Context Broker Host
      - IOTA_CB_PORT=1026 # Context Broker Port
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb # Stores device mappings in Mongo
      - IOTA_MONGO_HOST=mongo
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentjson
      - IOTA_MQTT_HOST=mosquitto # Connects to your Mosquitto broker
      - IOTA_MQTT_PORT=1883
      - IOTA_CB_NGSI_VERSION=ld # Ensures compatibility with Orion-LD
      - IOTA_AUTOCAST=true # Automatically casts numbers and booleans
      - IOTA_LOG_LEVEL=DEBUG
      - IOTA_JSON_LD_CONTEXT=https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
      - IOTA_DEFAULT_RESOURCE=/iot/json          # Must match resource in service provisioning
      - IOTA_PROVIDER_URL=http://iot-agent:4041  # Agent's own address for Orion registration
      - IOTA_CB_LD_CONTEXT=https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
      - IOTA_TIMESTAMP=true

volumes:
  mongo-db:
  postgres-db:
  grafana-storage: